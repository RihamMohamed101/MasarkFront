
<div class="chat-container" dir="rtl" style="max-width: 600px; margin: 2rem auto; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
  
  <div style="background-color: #007bff; color: white; padding: 1rem; text-align: center;">
    <h3 style="margin: 0;">غرفة الدردشة: {{ roomId }}</h3>
  </div>

  <div class="messages-box" style="height: 400px; overflow-y: auto; padding: 1rem; background-color: #e5ddd5; display: flex; flex-direction: column; gap: 10px;">
    
    @for (msg of chatService.messages(); track $index) {
      <div style="display: flex; width: 100%;"
           [style.justify-content]="msg.senderName === currentUser ? 'flex-start' : 'flex-end'">
        
        <div [ngStyle]="{
               'background-color': msg.senderName === currentUser ? '#dcf8c6' : '#ffffff',
               'border-radius': msg.senderName === currentUser ? '10px 0 10px 10px' : '0 10px 10px 10px'
             }"
             style="padding: 10px 15px; max-width: 70%; box-shadow: 0 1px 2px rgba(0,0,0,0.1);">
          
          @if (msg.senderName !== currentUser) {
            <small style="display: block; color: #007bff; font-weight: bold; margin-bottom: 3px;">
              {{ msg.senderName }}
            </small>
          }

          <p style="margin: 0; color: #303030; font-size: 15px; line-height: 1.5;">
            {{ msg.content }}
          </p>
          
          <small style="display: block; text-align: left; color: #888; font-size: 0.70rem; margin-top: 5px;">
            {{ msg.createdAt | date:'shortTime' }}
          </small>
          
        </div>
      </div>
    }

  </div>

  <div style="padding: 1rem; background-color: white; border-top: 1px solid #ddd; display: flex; gap: 10px; align-items: center;">
    <input 
      type="text" 
      [(ngModel)]="newMessageContent" 
      (keyup.enter)="sendMessage()"
      placeholder="اكتب رسالتك هنا..." 
      style="flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 20px; outline: none; font-size: 15px; background-color: #f0f2f5;"
    />
    <button 
      (click)="sendMessage()" 
      style="padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; transition: background-color 0.2s;">
      إرسال
    </button>
  </div>
</div>
