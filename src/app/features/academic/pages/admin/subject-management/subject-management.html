<div class="p-6 max-w-6xl mx-auto">
  <h2 class="text-2xl font-bold mb-6 text-gray-800">إدارة المواد الدراسية (Subjects Management)</h2>

  <div class="bg-gray-50 p-4 rounded-lg border mb-6 flex items-center gap-4">
    <label class="font-medium text-gray-700">اختر المرحلة الدراسية للتحكم بموادها:</label>
    <select [(ngModel)]="selectedGradeId" (change)="onGradeChange()" class="border p-2 rounded bg-white outline-none focus:ring-2 focus:ring-blue-500 text-gray-700 min-w-[200px]">
      <option *ngFor="let grade of grades" [value]="grade.gradeId">{{ grade.nameAr }} ({{ grade.name }})</option>
    </select>
    <span *ngIf="isLoadingGrades" class="text-sm text-gray-500 animate-pulse">جاري تحميل المراحل...</span>
  </div>

  <div class="bg-white p-6 rounded-lg shadow-sm border mb-8" *ngIf="selectedGradeId">
    <h3 class="text-lg font-semibold mb-4 text-gray-700">إضافة مادة جديدة لهذه المرحلة</h3>
    <form (ngSubmit)="addSubject()" #subjectForm="ngForm" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
      
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">اسم المادة (EN)</label>
        <input type="text" [(ngModel)]="newSubject.name" name="name" required class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g., Programming 101">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">اسم المادة (AR)</label>
        <input type="text" [(ngModel)]="newSubject.nameAr" name="nameAr" required class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none" placeholder="مثال: أساسيات البرمجة">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">كود المادة / اختصار (اختياري)</label>
        <input type="text" [(ngModel)]="newSubject.code" name="code" class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g., CS-101">
      </div>

      <button type="submit" [disabled]="!subjectForm.form.valid" class="bg-blue-600 hover:bg-blue-700 text-white font-medium p-2 rounded disabled:bg-gray-300 transition-colors">
        إضافة المادة
      </button>
    </form>
  </div>

  <div class="bg-white rounded-lg shadow-sm border overflow-hidden">
    <div class="p-4 border-b bg-gray-50 flex justify-between items-center">
      <h3 class="font-semibold text-gray-700">المواد الدراسية المقررة</h3>
      <span *ngIf="isLoadingSubjects" class="text-sm text-blue-600 animate-pulse">جاري تحميل المواد...</span>
    </div>

    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="bg-gray-100 text-gray-700 uppercase text-sm border-b">
          <th class="p-4">كود المادة</th>
          <th class="p-4">اسم المادة (EN)</th>
          <th class="p-4">اسم المادة (AR)</th>
        </tr>
      </thead>
      <tbody class="text-gray-600 text-sm">
        <tr *ngFor="let subject of subjects" class="border-b hover:bg-gray-50 transition-colors">
          <td class="p-4"><span class="bg-gray-200 px-2 py-1 rounded text-xs font-mono font-bold">{{ subject.code || 'N/A' }}</span></td>
          <td class="p-4 font-medium">{{ subject.name }}</td>
          <td class="p-4 text-right font-medium" dir="rtl">{{ subject.nameAr }}</td>
        </tr>
        <tr *ngIf="subjects.length === 0 && !isLoadingSubjects">
          <td colspan="3" class="p-8 text-center text-gray-400">لا توجد مواد دراسية مضافة لهذه المرحلة بعد.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
