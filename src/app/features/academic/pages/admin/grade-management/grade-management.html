<div class="container py-4">

  <h2 class="mb-4 fw-bold">
    إدارة المراحل الدراسية (Grades Management)
  </h2>

  <!-- Form Card -->
  <div class="card mb-4 shadow-sm">
    <div class="card-body">

      <h5 class="card-title mb-3">
        إضافة مرحلة دراسية جديدة
      </h5>

      <form (ngSubmit)="addGrade()" #gradeForm="ngForm" class="row g-3">

        <!-- Name EN -->
        <div class="col-md-4">
          <label class="form-label">الاسم بالإنجليزية</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="newGrade.name"
            name="name"
            required
            placeholder="e.g., Grade 1"
          />
        </div>

        <!-- Name AR -->
        <div class="col-md-4">
          <label class="form-label">الاسم بالعربية</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="newGrade.nameAr"
            name="nameAr"
            required
            placeholder="مثال: الصف الأول الابتدائي"
          />
        </div>

        <!-- Stage -->
        <div class="col-md-4">
          <label class="form-label">المرحلة الأساسية</label>
          <select
            class="form-select"
            [(ngModel)]="newGrade.stage"
            name="stage"
          >
            <option value="Primary">ابتدائي</option>
            <option value="Preparatory">إعدادي</option>
            <option value="Secondary">ثانوي</option>
          </select>
        </div>

        <!-- Button -->
        <div class="col-12">
          <button
            type="submit"
            class="btn btn-primary"
            [disabled]="!gradeForm.form.valid"
          >
            إضافة المرحلة
          </button>
        </div>

      </form>

    </div>
  </div>

  <!-- Table Card -->
  <div class="card shadow-sm">

    <div class="card-header d-flex justify-content-between align-items-center">
      <span class="fw-bold">المراحل الحالية في النظام</span>

      <span *ngIf="isLoading" class="text-primary">
        Loading...
      </span>
    </div>

    <div class="table-responsive">

      <table class="table table-hover mb-0">

        <thead class="table-light">
          <tr>
            <th>الترتيب</th>
            <th>الاسم (EN)</th>
            <th>الاسم (AR)</th>
            <th>المرحلة</th>
            <th>الحالة</th>
          </tr>
        </thead>

        <tbody>

          <tr *ngFor="let grade of grades">

            <td>{{ grade.order }}</td>
            <td>{{ grade.name }}</td>
            <td dir="rtl">{{ grade.nameAr }}</td>

            <td>
              <span class="badge"
                [ngClass]="{
                  'bg-success': grade.stage === 'Primary',
                  'bg-warning text-dark': grade.stage === 'Preparatory',
                  'bg-secondary': grade.stage === 'Secondary'
                }">
                {{ grade.stage }}
              </span>
            </td>

            <td>
              <span [ngClass]="grade.isActive ? 'text-success' : 'text-danger'">
                {{ grade.isActive ? 'نشط' : 'ملغي' }}
              </span>
            </td>

          </tr>

          <tr *ngIf="grades.length === 0 && !isLoading">
            <td colspan="5" class="text-center text-muted py-4">
              لا توجد مراحل دراسية مضافة حتى الآن.
            </td>
          </tr>

        </tbody>

      </table>

    </div>
  </div>

</div>
